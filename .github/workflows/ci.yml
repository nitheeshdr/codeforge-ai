name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit & component tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Build-time placeholders; real values are set on the host platform
          MONGODB_URI: mongodb://127.0.0.1:27017/ci-build
          AUTH_SECRET: ci-build-secret

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    needs: quality
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:e2e
        env:
          AUTH_SECRET: ci-e2e-secret
          MONGODB_URI: mongodb://127.0.0.1:27017/ci-e2e
